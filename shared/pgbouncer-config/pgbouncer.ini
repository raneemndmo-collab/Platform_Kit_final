; =============================================================================
; ARC-001 FIX: PgBouncer Configuration for Rasid v6.4
; Reduces 62 module connections to pooled connections
; Deploy alongside PostgreSQL in production
; =============================================================================
[databases]
; All module databases route through PgBouncer
* = host=localhost port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ARC-001: Connection pooling settings
pool_mode = transaction
default_pool_size = 20
max_client_conn = 500
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100

; Timeouts
server_idle_timeout = 300
client_idle_timeout = 600
query_timeout = 30
query_wait_timeout = 60

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Security
server_tls_sslmode = prefer
