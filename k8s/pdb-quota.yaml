apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rasid-app-pdb
  namespace: rasid
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rasid-app
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: rasid-quota
  namespace: rasid
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: rasid-limits
  namespace: rasid
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      type: Container
