apiVersion: apps/v1
kind: Deployment
metadata:
  name: rasid-app
  namespace: rasid
  labels:
    app: rasid-app
    app.kubernetes.io/part-of: rasid-platform
    rasid.io/version: "6.4"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rasid-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rasid-app
        rasid.io/tier: application
        rasid.io/version: "6.4"
    spec:
      serviceAccountName: rasid-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: rasid-app
          image: registry.digitalocean.com/rasid-registry/rasid-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rasid-config
            - secretRef:
                name: rasid-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: rasid-app
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rasid-sa
  namespace: rasid
  labels:
    app.kubernetes.io/part-of: rasid-platform
