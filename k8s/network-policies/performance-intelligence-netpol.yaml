apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: performance-intelligence-isolation
  namespace: rasid
  labels:
    app.kubernetes.io/part-of: rasid-platform
    rasid.io/module: performance-intelligence
    rasid.io/version: "6.4"
spec:
  podSelector:
    matchLabels:
      app: performance-intelligence
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: m30-gateway
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - podSelector:
            matchLabels:
              rasid.io/tier: kernel
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: performance-intelligence-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              rasid.io/tier: kernel
      ports:
        - protocol: TCP
          port: 3000
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
