# RASID v6.2 NetworkPolicy: m20-notification-center (ZTS-019)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: m20-notification-center-netpol
  namespace: rasid-platform
  labels:
    app: m20-notification-center
    v62-governance: "true"
spec:
  podSelector:
    matchLabels:
      app: m20-notification-center
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: m30-gateway
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - podSelector:
            matchLabels:
              app: k9-monitoring
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: m20-notification-center-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: k1-auth
    - to:
        - podSelector:
            matchLabels:
              app: k5-events
    - to:
        - podSelector:
            matchLabels:
              app: k6-notification
    - to:
        - podSelector:
            matchLabels:
              app: k9-monitoring
