# RASID v6.2 NetworkPolicy: m17-vision-ai (ZTS-019)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: m17-vision-ai-netpol
  namespace: rasid-platform
  labels:
    app: m17-vision-ai
    v62-governance: "true"
spec:
  podSelector:
    matchLabels:
      app: m17-vision-ai
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: m30-gateway
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - podSelector:
            matchLabels:
              app: k9-monitoring
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: m17-vision-ai-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: k5-events
    - to:
        - podSelector:
            matchLabels:
              app: k9-monitoring
    - to:
        - podSelector:
            matchLabels:
              app: m11-ai-orchestration
