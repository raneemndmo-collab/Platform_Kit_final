apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: m26-scheduler-network-policy
  namespace: rasid
  labels:
    rasid.io/module: m26-scheduler
    rasid.io/version: "6.4"
spec:
  podSelector:
    matchLabels:
      app: m26-scheduler
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: m30-gateway
        - podSelector:
            matchLabels:
              rasid.io/tier: kernel
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: m26-scheduler-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              rasid.io/tier: kernel
      ports:
        - protocol: TCP
          port: 3000
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
