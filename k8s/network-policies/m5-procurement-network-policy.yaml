apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: m5-procurement-network-policy
  namespace: rasid
  labels:
    rasid.io/module: "m5-procurement"
    rasid.io/version: "6.4"
spec:
  podSelector:
    matchLabels:
      app: m5-procurement
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: m30-gateway
        - podSelector:
            matchLabels:
              rasid.io/tier: kernel
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: m5-procurement-db
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              rasid.io/tier: kernel
      ports:
        - port: 3000
          protocol: TCP
    - to: []
      ports:
        - port: 53
          protocol: UDP
