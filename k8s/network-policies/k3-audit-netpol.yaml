# RASID v6.2 NetworkPolicy: k3-audit (ZTS-019)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k3-audit-netpol
  namespace: rasid-platform
  labels:
    app: k3-audit
    v62-governance: "true"
spec:
  podSelector:
    matchLabels:
      app: k3-audit
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: m30-gateway
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - podSelector:
            matchLabels:
              app: k9-monitoring
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: k3-audit-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: k5-events
    - to:
        - podSelector:
            matchLabels:
              app: k9-monitoring
