# =============================================================================
# Rasid Platform v6.2 — Document Processing Cluster (DPC)
# Constitutional Reference: TXD-003, Part 13
# DPC resources SHALL be physically isolated from OLTP, AI, Dashboard clusters
# =============================================================================

cluster:
  name: rasid-dpc
  namespace: rasid-dpc
  isolation: physical  # TXD-003: Physical isolation from OLTP

# Resource Quotas (TXD-006: 10,000+ concurrent jobs without OLTP degradation)
resourceQuota:
  cpu: "64"
  memory: "128Gi"
  pods: "200"
  persistentVolumeClaims: "50"

# Node Pool Configuration
nodePool:
  name: dpc-pool
  machineType: n2-highmem-16
  minNodes: 3
  maxNodes: 20
  taints:
    - key: workload-type
      value: document-processing
      effect: NoSchedule
  labels:
    cluster-role: dpc

# GPU Node Pool (for D3-VSM, D6-Media, D10-Translation)
gpuNodePool:
  name: dpc-gpu-pool
  machineType: n1-standard-8
  acceleratorType: nvidia-tesla-t4
  acceleratorCount: 1
  minNodes: 0
  maxNodes: 10
  taints:
    - key: nvidia.com/gpu
      value: "true"
      effect: NoSchedule

# DPC Module Deployments
modules:
  d1-cdr-engine:
    replicas: 3
    cpu: "2"
    memory: "4Gi"
    maxConcurrentJobs: 100
    cluster: dpc

  d2-layout-graph:
    replicas: 2
    cpu: "1"
    memory: "2Gi"
    cluster: dpc

  d3-visual-semantic:
    replicas: 2
    cpu: "2"
    memory: "4Gi"
    gpu: true  # DPC-GPU
    cluster: dpc-gpu

  d4-conversion-orchestrator:
    replicas: 3
    cpu: "2"
    memory: "4Gi"
    maxConcurrentJobs: 1000
    cluster: dpc

  d5-rendering-engine:
    replicas: 3
    cpu: "4"
    memory: "8Gi"
    cluster: dpc

  d6-media-engine:
    replicas: 2
    cpu: "4"
    memory: "8Gi"
    gpu: true
    maxMemoryPerJob: "8Gi"  # Part 13: max 8GB per job
    cluster: dpc-gpu

  d7-interaction-engine:
    replicas: 2
    cpu: "1"
    memory: "2Gi"
    cluster: dpc

  d8-typography-engine:
    replicas: 2
    cpu: "1"
    memory: "2Gi"
    cluster: dpc

  d9-brand-enforcement:
    replicas: 2
    cpu: "1"
    memory: "2Gi"
    cluster: dpc

  d10-translation-direction:
    replicas: 2
    cpu: "2"
    memory: "4Gi"
    gpu: true
    cluster: dpc-gpu

  d11-design-constraint:
    replicas: 2
    cpu: "1"
    memory: "2Gi"
    cluster: dpc

  d12-data-rebinding:
    replicas: 2
    cpu: "1"
    memory: "2Gi"
    cluster: dpc

  d13-visual-drift:
    replicas: 2
    cpu: "2"
    memory: "4Gi"
    cluster: dpc

# Priority Queues (Part 13)
queues:
  p0-critical:
    maxConcurrent: 100
    timeout: 30s
    priority: 0
  p1-standard:
    maxConcurrent: 500
    timeout: 120s
    priority: 1
  p2-bulk:
    maxConcurrent: 200
    timeout: 300s
    priority: 2
  p3-background:
    maxConcurrent: 100
    timeout: 600s
    priority: 3

# Network Isolation
networkPolicy:
  # DPC modules can communicate with each other
  internalAllowed: true
  # DPC can reach: K5 (events), K9 (monitoring), M11 (AI inference)
  egressAllowed:
    - namespace: rasid-kernel
      pods: [k5-event-bus, k9-monitoring]
    - namespace: rasid-ai
      pods: [m11-ai-orchestration]
  # OLTP modules CANNOT reach DPC directly
  ingressDenied:
    - namespace: rasid-business
