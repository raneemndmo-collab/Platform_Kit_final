; ARC-001 FIX: PgBouncer configuration for production
; Consolidates 62 connection names into 6 domain database pools
; Deploy alongside PostgreSQL to limit actual connections

[databases]
kernel_db = host=postgres port=5432 dbname=kernel_db pool_size=15
business_db = host=postgres port=5432 dbname=business_db pool_size=15
workflow_db = host=postgres port=5432 dbname=workflow_db pool_size=15
intelligence_db = host=postgres port=5432 dbname=intelligence_db pool_size=15
experience_db = host=postgres port=5432 dbname=experience_db pool_size=15
tierx_db = host=postgres port=5432 dbname=tierx_db pool_size=15

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 15
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
server_lifetime = 3600
server_idle_timeout = 600
log_connections = 1
log_disconnections = 1
stats_period = 60
