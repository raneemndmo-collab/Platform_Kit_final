module:
  id: M3
  name: CRM
  version: 1.0.0
  tier: business-domain
  phase: 1
  complexity: MEDIUM
database:
  name: crm_db
  isolation: dedicated
  tier: 2
dependencies:
  kernel: [K1, K2, K3, K4, K5, K6, K9, K10]
  modules: []
api:
  basePath: /api/v1/crm
  version: v1
events:
  event_namespace: crm
  namespace: crm
  publishes:
    - crm.lead.created
    - crm.lead.converted
    - crm.opportunity.won
    - crm.opportunity.lost
    - crm.activity.logged
  subscribes:
    - finance.invoice.paid
health:
  endpoint: /api/v1/crm/health
  interval: 15s
