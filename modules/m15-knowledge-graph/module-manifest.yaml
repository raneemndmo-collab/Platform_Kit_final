module_id: M15
name: Knowledge Graph
version: 1.0.0
phase: 3
database:
  name: knowledge_graph_db
  type: postgresql
  tier: 3
  instance: db-ai-01
event_namespace: ai.kg
api_base: /api/v1/knowledge-graph
dependencies:
  kernel: [K1, K2, K3, K5, K9, K10]
  modules: [M11, M16]
containment:
  db_credentials: knowledge_graph_db_only
  no_cross_db_access: true
events_published:
  - ai.kg.node.created
  - ai.kg.edge.created
events_subscribed:
  - "*.created"
  - "*.updated"
health_endpoint: /api/v1/knowledge-graph/health
complexity: HIGH
