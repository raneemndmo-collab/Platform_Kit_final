module_id: M10
name: Legal Contract Management
version: 1.0.0
phase: 2
database:
  name: legal_db
  type: postgresql
  tier: 2
  instance: db-business-02
event_namespace: contract
api_base: /api/v1/contracts
dependencies:
  kernel: [K1, K2, K3, K4, K5, K6, K7, K9, K10]
  modules: [M7, M8, M25]
events_published:
  - contract.created
  - contract.active
  - contract.expired
  - contract.terminated
  - contract.obligation.created
  - contract.obligation.fulfilled
events_subscribed:
  - workflow.completed
  - document.approved
health_endpoint: /api/v1/contracts/health
complexity: MEDIUM
