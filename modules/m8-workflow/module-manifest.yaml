module_id: M8
name: Workflow Engine
version: 1.0.0
phase: 2
database:
  name: workflow_db
  type: postgresql
  tier: 2
  instance: db-business-02
event_namespace: workflow
api_base: /api/v1/workflows
dependencies:
  kernel: [K1, K2, K3, K4, K5, K6, K7, K9, K10]
  modules: []
events_published:
  - workflow.started
  - workflow.step.approved
  - workflow.step.rejected
  - workflow.completed
  - workflow.cancelled
events_subscribed:
  - "*.approval.requested"
health_endpoint: /api/v1/workflows/health
complexity: MEDIUM-HIGH
