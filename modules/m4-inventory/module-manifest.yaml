module:
  id: M4
  name: Inventory
  version: 1.0.0
  tier: business-domain
  phase: 1
  complexity: MEDIUM
database:
  name: inventory_db
  isolation: dedicated
  tier: 2
dependencies:
  kernel: [K1, K2, K3, K4, K5, K9, K10]
  modules: []
api:
  basePath: /api/v1/inventory
  version: v1
events:
  event_namespace: inventory
  namespace: inventory
  publishes:
    - inventory.stock.received
    - inventory.stock.issued
    - inventory.stock.low
    - inventory.stock.adjusted
  subscribes:
    - procurement.order.received
health:
  endpoint: /api/v1/inventory/health
  interval: 15s
