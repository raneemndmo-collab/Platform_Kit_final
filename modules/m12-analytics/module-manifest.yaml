module_id: M12
name: Analytics
version: 1.0.0
phase: 3
database:
  name: analytics_db
  type: postgresql
  tier: 3
  instance: db-analytics-01
event_namespace: analytics
api_base: /api/v1/analytics
dependencies:
  kernel: [K1, K2, K3, K5, K9, K10]
  modules: [M11]
data_lake:
  tiers: [hot, warm, cold]
  hot_retention: 7d
  warm_retention: 90d
  cold_retention: 365d
events_published:
  - analytics.event.ingested
  - analytics.batch.ingested
events_subscribed:
  - "*.*"
health_endpoint: /api/v1/analytics/health
complexity: HIGH
