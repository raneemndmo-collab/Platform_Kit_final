module:
  id: M5
  name: Procurement
  version: 1.0.0
  tier: business-domain
  phase: 1
  complexity: MEDIUM-HIGH
database:
  name: procurement_db
  isolation: dedicated
  tier: 2
dependencies:
  kernel: [K1, K2, K3, K4, K5, K6, K7, K8, K9, K10]
  modules: []
api:
  basePath: /api/v1/procurement
  version: v1
events:
  event_namespace: procurement
  namespace: procurement
  publishes:
    - procurement.order.created
    - procurement.order.approved
    - procurement.order.received
    - procurement.vendor.onboarded
  subscribes:
    - inventory.stock.low
health:
  endpoint: /api/v1/procurement/health
  interval: 15s
